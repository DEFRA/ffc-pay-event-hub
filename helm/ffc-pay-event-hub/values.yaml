environment: production
environmentCode:
name: ffc-pay-event-hub
namespace: ffc-pay
workstream: ffc-pay
image: ffc-pay-event-hub

labels:
  component: service

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-pay-event-hub-config-map

containerSecret:
  name: ffc-pay-event-hub-container-secret
  type: Opaque

deployment:
  minReplicas: 1
  maxReplicas: 4
  cpuThreshold: 80
  memoryThreshold: 80

container:
  requestMemory: 400Mi
  requestCpu: 400m
  limitMemory: 500Mi
  port: 3011
  processingActive: true
  messageQueueHost: namespace.servicebus.windows.net
  eventsTopicAddress: ffc-pay-events
  eventsSubscriptionAddress: ffc-pay-event-hub
  maxConcurrentCalls: 10
  alertTopicAddress: ffc-pay-alert
  dataTopicAddress: ffc-pay-data-request
  dataSubscriptionAddress: ffc-pay-data-hub
  dataResponseQueueAddress: ffc-pay-data-request-response
  azureStorageConnectionString: dummy
  azureStorageUseConnectionString: false
  azureStorageAccountName: ffcpay

postgresService:
  postgresDb: ffc_pay_event_hub
  postgresqlHost: ffc-pay-event-hub-postgres
  postgresPort: 5432
  postgresSchema: public
  postgresUser: postgres

livenessProbe:
  path: /healthz
  port: 3011
  initialDelaySeconds: 20
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  path: /healthy
  port: 3011
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

workloadIdentity: true

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret
      - objectName: snd2-redisPassword # secret name in Azure Key Vault
        objectType: secret

  secretObjects: # creating a Kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pay-event-hub
      type: Opaque
      data:
        - objectName: appInsights-connectionString # secret name in Azure Key Vault
          key: APPLICATIONINSIGHTS_CONNECTION_STRING # the secret key in the Kubernetes secret and use in the application
        - objectName: snd2-redisPassword # secret name in Azure Key Vault
          key: REDIS_PASSWORD # the secret key in the Kubernetes secret and use in the application
